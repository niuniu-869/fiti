<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1309" />
  <meta name="description" content="FinanceTI 金融人格测试 · 基于认知·行为·社交三大模型的职业画像，12 维度精准匹配 18 种金融圈角色。" />
  <meta name="format-detection" content="telephone=no" />
  <title>FinanceTI 金融人格测试</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.92em' font-size='92'>💰</text></svg>" />
</head>
<body>
  <div id="app">

    <!-- 首页 -->
    <section id="page-intro" class="page active">
      <div class="card intro-card">
        <div class="intro-badge">FiTI · v1.0</div>
        <h1 class="intro-title" id="intro-title">FinanceTI<br/>金融人格测试</h1>
        <p class="intro-subtitle" id="intro-subtitle">基于认知行为科学的金融职业画像</p>

        <ul class="intro-features">
          <li><span>🧠</span><span>3 大模型 × 12 维度精准画像</span></li>
          <li><span>💼</span><span>18 种金融圈原创人格</span></li>
          <li><span>📊</span><span id="intro-reference">参考黑石 Pymetrics 测评体系</span></li>
          <li><span>🎯</span><span>身份分层，实习 / 在职差异化建议</span></li>
        </ul>

        <button id="btn-start" class="btn btn-primary">开始测试</button>
        <p class="intro-note">约 5 分钟 · 33 道题（含 1 道身份问题 + 2 道随机彩蛋）</p>
        <p class="intro-credit">开源项目 · 仅供娱乐参考</p>
      </div>
    </section>

    <!-- 答题页 -->
    <section id="page-quiz" class="page">
      <div class="card quiz-card">
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-text" id="progress-text">0 / 33</div>

        <div class="question-area">
          <p class="question-hint" id="question-hint"></p>
          <p class="question-text" id="question-text"></p>
        </div>

        <div class="options" id="options"></div>
      </div>
    </section>

    <!-- 结果页 -->
    <section id="page-result" class="page">
      <div class="card result-card" id="result-card">
        <div class="result-identity" id="result-identity">身份</div>
        <div class="result-kicker" id="result-kicker">你的金融人格</div>
        <div class="result-code" id="result-code"></div>
        <div class="result-name" id="result-name"></div>
        <div class="result-title" id="result-title"></div>
        <div class="result-badge" id="result-badge"></div>
        <div class="result-intro" id="result-intro"></div>
        <div class="result-desc" id="result-desc"></div>

        <div class="result-secondary" id="result-secondary" style="display:none">
          <div class="secondary-label">次要匹配</div>
          <div class="secondary-info" id="secondary-info"></div>
        </div>

        <h3 class="section-title">十二维度画像</h3>
        <div class="radar-wrap">
          <canvas id="radar-chart"></canvas>
        </div>

        <div class="dimensions-detail" id="dimensions-detail"></div>

        <div class="result-top">
          <h3 class="section-title">最佳匹配 TOP 5</h3>
          <div id="top-list" class="top-list"></div>
        </div>

        <p class="disclaimer" id="disclaimer"></p>
        <p class="fun-note" id="fun-note"></p>

        <div class="result-actions">
          <button id="btn-share" class="btn btn-secondary">📸 生成分享卡</button>
          <button id="btn-restart" class="btn btn-primary">重新测试</button>
        </div>
      </div>
    </section>

    <!-- 分享海报 Modal -->
    <div id="poster-modal" class="poster-modal" hidden>
      <div class="poster-modal-backdrop" id="poster-backdrop"></div>
      <div class="poster-modal-body">
        <div class="poster-modal-hint">
          <span class="poster-tip-icon">💡</span>
          <span class="poster-tip-text">长按图片保存到相册 · 分享给朋友让 ta 也来测</span>
        </div>
        <div class="poster-img-wrap">
          <div id="poster-loading" class="poster-loading">生成中…</div>
          <img id="poster-img" class="poster-img" alt="FiTI 分享卡" />
        </div>
        <div class="poster-actions">
          <a id="poster-download" class="btn btn-ghost" download="fiti-share.png">下载图片</a>
          <button id="poster-close" class="btn btn-primary">关闭</button>
        </div>
      </div>
    </div>

  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
